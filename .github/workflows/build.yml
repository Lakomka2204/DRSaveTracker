name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 8.0.x
      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build EXE
        shell: bash
        run: >
          dotnet publish winforms/DRSaveTracker.csproj \
            -c Release \
            -r win-x64 \
            -o publish \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:PublishTrimmed=false \
            -p:Version=$VERSION
          
      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            publish/DRSaveTracker.exe \
            --title "${{ github.ref_name }}" \
            --generate-notes