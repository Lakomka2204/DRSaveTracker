name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
          - os: windows-latest
            rid: win-x86
            ext: .exe
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
          - os: macos-latest
            rid: osx-x64
            ext: ""
          - os: macos-latest
            rid: osx-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 8.0.x

      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: >
          dotnet publish crossplatformapp/crossplatformapp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o publish \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true
            -p:AllowedReferenceRelatedFileExtensions=
            -p:Version=$VERSION

      - name: Rename artifact per platform
        shell: bash
        run: |
          mv "publish/DRSaveTracker${{ matrix.ext }}" "publish/DRSaveTracker-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DRSaveTracker-${{ matrix.rid }}
          path: publish/DRSaveTracker-${{ matrix.rid }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/*/* \
            --title "${{ github.ref_name }}" \
            --generate-notes