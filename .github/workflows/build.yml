name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish Release
        shell: bash
        run: >
          dotnet publish winforms/DRSaveTracker.csproj \
            -c Release \
            -r win-x64 \
            -o publish \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false
            
      - name: Get ALL files
        shell: pwsh
        run: dir -Depth 4

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DRSaveTracker-win-x64
          path: publish/DRSaveTracker.exe
